<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail - Teemo Portfolio</title>
    <meta name="description" content="Selected project key visual detail from Teemo Wang portfolio." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="detail-body">
    <a class="detail-fixed-back" href="./index.html?check=2#work" aria-label="Back to portfolio"></a>

    <div class="page-scanlight" aria-hidden="true">
      <span class="scanlight-beam scanlight-beam-a"></span>
      <span class="scanlight-beam scanlight-beam-b"></span>
    </div>

    <main class="detail-shell">
      <header class="detail-header">
        <a class="brand detail-brand" href="./index.html?check=2#work" aria-label="Back to portfolio">
          <img src="./sucai/Logo.png" alt="TEEMO" />
        </a>
        <a class="detail-back" href="./index.html?check=2#work">Back to Project Works</a>
      </header>

      <section class="detail-hero">
        <div class="detail-meta">
          <span id="detailIndex">01</span>
          <strong id="detailType">Website Design</strong>
        </div>
        <h1 id="detailTitle">Project Works</h1>
        <p id="detailSummary">
          Selected key visual detail from the portfolio.
        </p>
      </section>

      <section class="detail-media-stage">
        <div class="detail-media" id="detailMedia"></div>
      </section>

      <section class="detail-info">
        <article>
          <span>Role</span>
          <strong id="detailRole">Visual Design / UI Direction</strong>
        </article>
        <article>
          <span>Focus</span>
          <strong id="detailFocus">Landing Page / Campaign Visual</strong>
        </article>
        <article>
          <span>Output</span>
          <strong id="detailOutput">Key Visual System</strong>
        </article>
      </section>
    </main>

    <script src="./work-detail.js"></script>
  </body>
</html>
